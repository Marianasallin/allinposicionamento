<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL IN — Gestão de Clientes</title>
<style>
:root{--primary:#0077B5;--primary-light:#00A0DC;--primary-dark:#005885;--bg:#F3F6F8;--card:#fff;--sidebar:#0A2D4E;--stext:#B8CDD9;--text:#1A1A2E;--muted:#6B7280;--border:#E5E7EB;--green:#057642;--gbg:#E6F7EE;--yellow:#B45309;--ybg:#FEF3C7;--red:#DC2626;--rbg:#FEE2E2;--gray:#6B7280;--gbg2:#F3F4F6;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
#sidebar{width:240px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
.sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo h2{color:white;font-size:18px;font-weight:800;letter-spacing:.5px}
.sb-logo span{color:var(--stext);font-size:11px}
.sb-nav{padding:12px 0;flex:1}
.ni{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--stext);cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.06);color:white}
.ni.active{background:rgba(0,119,181,.2);color:white;border-left-color:var(--primary-light);font-weight:600}
.ni-icon{font-size:16px;width:20px;text-align:center}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);color:var(--stext);font-size:11px}
#main{margin-left:240px;flex:1}
.topbar{background:white;padding:13px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar h1{font-size:17px;font-weight:700}
.content{padding:24px 28px}
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ch h3{font-size:13px;font-weight:600}
.cb{padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.stat{background:white;border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-num{font-size:30px;font-weight:800;color:var(--primary)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cc{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.cc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.cc-top{padding:14px 16px;display:flex;align-items:center;gap:12px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;flex-shrink:0}
.av-s{width:36px;height:36px;font-size:12px}
.av-m{width:44px;height:44px;font-size:15px}
.av-l{width:60px;height:60px;font-size:20px}
.cname{font-size:14px;font-weight:600;line-height:1.3}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#EFF6FF;color:#1D4ED8;font-weight:500}
.tag-g{background:#DCFCE7;color:#166534}
.tag-r{background:var(--rbg);color:var(--red)}
.tag-y{background:var(--ybg);color:var(--yellow)}
.tag-gray{background:var(--gbg2);color:var(--gray)}
.psec{padding:10px 16px 12px;background:#FAFAFA;border-top:1px solid var(--border)}
.pb-track{background:#E5E7EB;border-radius:99px;height:5px}
.pb-fill{height:5px;border-radius:99px}
.srow{display:flex;gap:10px;margin-top:6px;font-size:11px}
.alert-s{padding:8px 16px;border-top:1px solid #FDE68A;background:#FFFBEB}
.drow{display:flex;align-items:center;gap:8px;font-size:11px;padding:2px 0}
.dname{flex:1}
.dresp{color:var(--muted);font-size:10px}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap;cursor:pointer;user-select:none}
.bc{background:var(--gbg);color:var(--green)}
.ba{background:var(--ybg);color:var(--yellow)}
.bp{background:var(--gbg2);color:var(--gray)}
.br{background:var(--rbg);color:var(--red)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--primary);cursor:pointer;margin-bottom:18px;font-weight:500}
.back:hover{text-decoration:underline}
.dh{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:22px;display:flex;align-items:center;gap:18px;margin-bottom:18px}
.dinfo h2{font-size:19px;font-weight:700}
.dinfo p{font-size:12px;color:var(--muted);margin-top:3px}
.tabs{display:flex;background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.tab{padding:11px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--primary);background:#F9FAFB}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);background:#EFF6FF}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#F9FAFB;padding:9px 13px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:11px 13px;font-size:12px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg textarea,.fg select{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);background:white;font-family:inherit;transition:border-color .2s}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--primary)}
.fg textarea{min-height:80px;resize:vertical}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{padding:7px 15px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-p{background:var(--primary);color:white}
.btn-p:hover{background:var(--primary-dark)}
.btn-o{background:white;color:var(--primary);border:1px solid var(--primary)}
.btn-o:hover{background:#EFF6FF}
.btn-s{padding:4px 9px;font-size:11px;border-radius:6px}
.weeks-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wk{border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.wk:hover{border-color:var(--primary);transform:translateY(-1px)}
.wk h4{font-size:11px;font-weight:600;margin-bottom:6px}
.wk.wc{background:var(--gbg);border-color:#B5DFC9}
.wk.wa{background:var(--ybg);border-color:#F0D88A}
.wk.wp{background:#F9FAFB}
.enc-grid{display:flex;flex-wrap:wrap;gap:6px}
.enc{width:34px;height:34px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s}
.enc:hover{border-color:var(--primary)}
.enc.ed{background:var(--gbg);color:var(--green);border-color:#B5DFC9}
.tooltip{position:relative;cursor:help;border-bottom:1px dotted var(--muted)}
.tooltip:hover::after{content:attr(data-tooltip);position:absolute;bottom:125%;left:50%;transform:translateX(-50%);background:#1A1A2E;color:white;padding:8px 12px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:10;font-weight:400}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.enc.ep{background:#F9FAFB;color:var(--muted)}
.filter-bar{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.fc{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:white;color:var(--muted);transition:all .2s}
.fc:hover,.fc.active{background:var(--primary);color:white;border-color:var(--primary)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh h2{font-size:15px;font-weight:700}
.nf{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;font-family:inherit;resize:vertical;min-height:90px;color:var(--text)}
.nf:focus{outline:none;border-color:var(--primary)}
.fi{border:none;font-size:12px;color:var(--muted);background:transparent;font-family:inherit;width:100%;cursor:pointer;padding:0}
.fi:focus{outline:1px solid var(--primary);border-radius:4px}
.sec-div{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-div::after{content:'';flex:1;height:1px;background:var(--border)}
.cap-bar{height:8px;border-radius:99px;overflow:hidden;background:#E5E7EB;margin-top:6px}
.cap-fill{height:8px;border-radius:99px}
#toast{position:fixed;bottom:22px;right:22px;background:#0A2D4E;color:white;padding:11px 18px;border-radius:10px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.pill-ativo{background:var(--gbg);color:var(--green)}
.pill-vencido{background:var(--rbg);color:var(--red)}
.pill-finalizado{background:var(--gbg2);color:var(--gray)}
input.mini,select.mini{font-size:11px;border:1px solid var(--border);border-radius:6px;padding:6px 9px;background:white;cursor:pointer;font-family:inherit}
input.mini:focus{outline:none;border-color:var(--primary)}
/* Modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:16px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.2)}
.modal-hd{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:16px 16px 0 0}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-body{padding:22px 24px}
.modal-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:white;border-radius:0 0 16px 16px}
.sec-h{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.7px;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid #DBEAFE;display:block}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fgrid-full{grid-column:1/-1}
/* Results tab */
.res-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.res-num{font-size:30px;font-weight:800;line-height:1}
.res-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
@media(max-width:900px){#sidebar{width:56px}.ni span:not(.ni-icon){display:none}.sb-logo span,.sb-footer,.sb-logo h2{display:none}#main{margin-left:56px}.stats-grid{grid-template-columns:repeat(2,1fr)}.fgrid{grid-template-columns:1fr}}

/* ============ PORTAL PREMIUM STYLES ============ */
.portal-wrapper{display:flex;min-height:100vh;background:#F5F7FA}
.portal-sidebar{width:260px;background:linear-gradient(180deg,#082C74 0%,#0A3A8E 100%);display:flex;flex-direction:column;padding:24px 16px;box-shadow:2px 0 8px rgba(0,0,0,.1)}
.portal-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding:0 8px}
.portal-logo-icon{font-size:24px}
.portal-logo-text{color:white;font-size:16px;font-weight:700}
.portal-nav{flex:1;display:flex;flex-direction:column;gap:8px}
.portal-nav-item{display:flex;align-items:center;gap:12px;padding:12px;color:rgba(255,255,255,.7);cursor:pointer;border-radius:10px;font-size:13px;font-weight:500;transition:all .2s;border-left:3px solid transparent}
.portal-nav-item:hover{background:rgba(255,255,255,.1);color:white}
.portal-nav-item.active{background:rgba(255,255,255,.15);color:white;border-left-color:#4A90E2}
.portal-nav-icon{font-size:16px;width:18px}
.portal-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)}
.portal-support{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:14px}
.portal-support h4{color:white;font-size:12px;font-weight:600;margin-bottom:6px}
.portal-support p{color:rgba(255,255,255,.7);font-size:11px;margin-bottom:10px;line-height:1.3}
.portal-support-btn{width:100%;padding:8px;background:#4A90E2;color:white;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:background .2s}
.portal-support-btn:hover{background:#3A7FD8}
.portal-content{flex:1;display:flex;flex-direction:column}
.portal-header{background:white;border-bottom:1px solid #E2E8F0;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.portal-header-title{font-size:15px;font-weight:600;color:#1E293B}
.portal-header-right{display:flex;align-items:center;gap:20px}
.portal-bell{cursor:pointer;font-size:18px;opacity:.6;transition:opacity .2s}
.portal-bell:hover{opacity:1}
.portal-user{display:flex;align-items:center;gap:12px;cursor:pointer}
.portal-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#0D3D9B,#4A90E2);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:13px}
.portal-user-info{display:flex;flex-direction:column;gap:2px}
.portal-user-name{font-size:12px;font-weight:600;color:#1E293B}
.portal-user-role{font-size:11px;color:#64748B}
.portal-dropdown{font-size:12px;color:#64748B}
.portal-main{padding:32px;flex:1;overflow-y:auto}
.portal-container{max-width:1600px;margin:0 auto}
.portal-hero{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px}
.portal-hero h1{font-size:28px;font-weight:700;margin-bottom:8px;color:#1E293B}
.portal-hero p{font-size:13px;color:#64748B;line-height:1.5}
.portal-filter{display:flex;align-items:center;gap:8px;padding:8px 14px;background:white;border:1px solid #E2E8F0;border-radius:10px;cursor:pointer;font-size:12px;color:#64748B;transition:all .2s}
.portal-filter:hover{border-color:#0D3D9B;background:#F8FAFF}
.portal-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.portal-metric{background:white;border:1px solid #E2E8F0;border-radius:12px;padding:20px;box-shadow:0 2px 4px rgba(0,0,0,.04);transition:all .2s}
.portal-metric:hover{border-color:#0D3D9B;box-shadow:0 4px 12px rgba(13,61,155,.08)}
.portal-metric-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.portal-metric-icon{font-size:24px}
.portal-metric-trend{display:flex;align-items:center;gap:4px;font-size:11px;color:#17B26A;font-weight:600}
.portal-metric-number{font-size:32px;font-weight:700;color:#0D3D9B;margin-bottom:4px}
.portal-metric-label{font-size:12px;color:#64748B;font-weight:500}
.portal-grid{display:grid;grid-template-columns:1fr 320px;gap:24px}
.portal-card{background:white;border:1px solid #E2E8F0;border-radius:12px;padding:24px;box-shadow:0 2px 4px rgba(0,0,0,.04)}
.portal-card-header{font-size:15px;font-weight:600;color:#1E293B;margin-bottom:20px}
.portal-timeline{display:flex;flex-direction:column;gap:2px}
.portal-timeline-item{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid #EEF2F7;transition:background .2s}
.portal-timeline-item:last-child{border-bottom:none}
.portal-timeline-item:hover{background:#F8FAFF}
.portal-timeline-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #E2E8F0}
.portal-timeline-dot.completed{background:#17B26A;border-color:#17B26A}
.portal-timeline-dot.pending{background:#F59E0B;border-color:#F59E0B}
.portal-timeline-dot.in-progress{background:#4A90E2;border-color:#4A90E2}
.portal-timeline-content{flex:1}
.portal-timeline-title{font-size:12px;font-weight:600;color:#1E293B;margin-bottom:2px}
.portal-timeline-desc{font-size:11px;color:#64748B}
.portal-timeline-status{font-size:10px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap}
.portal-timeline-status.completed{background:#DCFCE7;color:#166534}
.portal-timeline-status.pending{background:#FEF3C7;color:#92400E}
.portal-timeline-status.in-progress{background:#DBEAFE;color:#0C4A6E}
.portal-btn-action{background:none;border:none;color:#4A90E2;cursor:pointer;font-weight:600;font-size:11px;transition:color .2s}
.portal-btn-action:hover{color:#0D3D9B}
.portal-sidebar-card{background:white;border:1px solid #E2E8F0;border-radius:12px;padding:18px;box-shadow:0 2px 4px rgba(0,0,0,.04);margin-bottom:16px}
.portal-sidebar-card-title{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.portal-meeting-date{font-size:24px;font-weight:700;color:#0D3D9B;margin-bottom:4px}
.portal-meeting-month{font-size:11px;color:#64748B;margin-bottom:12px;font-weight:500}
.portal-meeting-name{font-size:12px;font-weight:600;color:#1E293B;margin-bottom:6px}
.portal-meeting-time{font-size:11px;color:#64748B;margin-bottom:2px}
.portal-meeting-attendees{font-size:10px;color:#64748B;margin-bottom:12px;padding-top:12px;border-top:1px solid #EEF2F7}
.portal-btn-link{display:inline-block;color:#0D3D9B;text-decoration:none;font-size:11px;font-weight:600;cursor:pointer;transition:color .2s}
.portal-btn-link:hover{color:#082C74}
.portal-actions{display:flex;flex-direction:column;gap:8px}
.portal-action-btn{padding:10px;background:#F8FAFF;border:1px solid #E2E8F0;border-radius:8px;color:#0D3D9B;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.portal-action-btn:hover{background:#EFF6FF;border-color:#0D3D9B}
.portal-tip{background:linear-gradient(135deg,#EFF6FF 0%,#F0F7FF 100%);border:1px solid #DBEAFE;border-radius:12px;padding:16px}
.portal-tip-label{font-size:10px;font-weight:700;color:#0D3D9B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.portal-tip-text{font-size:11px;color:#0C4A6E;line-height:1.5}
.portal-login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D3D9B,#082C74);padding:20px}
.portal-login-card{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:400px;padding:50px 40px;text-align:center}
.portal-login-logo{margin-bottom:30px}
.portal-login-logo svg{width:80px;margin:0 auto;display:block}
.portal-login-title{font-size:24px;font-weight:700;margin:20px 0 8px;color:#1E293B}
.portal-login-subtitle{color:#64748B;font-size:13px;margin-bottom:32px;line-height:1.5}
.portal-login-form{display:flex;flex-direction:column;gap:12px}
.portal-login-group{text-align:left}
.portal-login-label{display:block;font-size:11px;font-weight:600;color:#64748B;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.portal-login-input{width:100%;padding:12px 14px;border:1px solid #E2E8F0;border-radius:10px;font-size:12px;font-family:inherit;transition:all .2s}
.portal-login-input:focus{outline:none;border-color:#0D3D9B;box-shadow:0 0 0 3px rgba(13,61,155,.1)}
.portal-password-container{position:relative}
.portal-password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#64748B;padding:0}

const COLORS=['#0077B5','#7C5CBF','#E8622A','#057642','#0891B2','#7C3AED','#B45309','#065F46','#1D4ED8','#9333EA','#0F766E','#D97706','#BE185D','#1E3A5F','#4A1942'];
function initials(n){return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('')}
function color(i){return COLORS[i%COLORS.length]}
function fmtDate(ts){if(!ts)return '—';const d=new Date(ts);return d.toLocaleDateString('pt-BR')}
function SL(s){return{concluido:'✅ Concluído',andamento:'🔄 Em andamento',pendente:'⏳ Pendente',atrasado:'❌ Atrasado'}[s]||s}
function SC(s){return{concluido:'bc',andamento:'ba',pendente:'bp',atrasado:'br'}[s]||'bp'}
function CS(s){return{pendente:'andamento',andamento:'concluido',concluido:'pendente',atrasado:'pendente'}[s]||'pendente'}
function WC(s){return{concluido:'wc',andamento:'wa',pendente:'wp'}[s]||'wp'}
function prog(c){const t=c.deliverables.length,d=c.deliverables.filter(x=>x.status==='concluido').length;return t?Math.round(d/t*100):0}
function progGP(c){
  const now=new Date();now.setHours(23,59,59,0);
  const allFris=fridaysFrom(c.startDate);
  const pastFris=allFris.filter(f=>f<=now);
  const wkTotal=pastFris.length;
  const wkDone=pastFris.filter(f=>{const k=getWeekKey(f);return c.weeklyReports&&c.weeklyReports[k]&&c.weeklyReports[k].done;}).length;
  const allMons=monthsFrom(c.startDate);
  const curMonStart=new Date(now.getFullYear(),now.getMonth(),1);
  const pastMons=allMons.filter(m=>m<=curMonStart);
  const mTotal=pastMons.length;
  const mDone=pastMons.filter(m=>{const k=getMonthKey(m);return c.monthlyReports&&c.monthlyReports[k]&&c.monthlyReports[k].done;}).length;
  const tot=wkTotal+mTotal;const done=wkDone+mDone;
  return{pct:tot>0?Math.round(done/tot*100):0,wkDone,wkTotal,mDone,mTotal};
}
function getDaysUntil(dueDate){if(!dueDate)return null;const today=new Date();today.setHours(0,0,0,0);const due=new Date(dueDate);due.setHours(0,0,0,0);return Math.floor((due-today)/(1000*60*60*24))}
function getDelStatusByDate(del){if(!del.dueDate)return del.status;const days=getDaysUntil(del.dueDate);if(days<0)return 'atrasado';return del.status}
function getDelClassByDate(del){const status=getDelStatusByDate(del);const days=getDaysUntil(del.dueDate);if(days!==null&&days>=0&&days<=7)return'ba';return SC(status)}
function getContractDaysRemaining(contractDue){const d=getDaysUntil(contractDue);if(d===null)return'—';if(d<0)return`${Math.abs(d)}d atrasado`;return`${d}d restante`}

function getCurrentFriday(){const d=new Date(),day=d.getDay(),diff=day===5?0:day<5?5-day:5+(7-day);d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
function getWeekKey(d){return d.toISOString().slice(0,10);}
function getMonthKey(d){const ms=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];return ms[d.getMonth()]+' '+d.getFullYear();}
function thisWeekKey(){return getWeekKey(getCurrentFriday());}
function thisMonthKey(){return getMonthKey(new Date());}
function lastNFridays(n){const f=getCurrentFriday(),res=[];for(let i=n-1;i>=0;i--){const d=new Date(f);d.setDate(d.getDate()-i*7);res.push(d);}return res;}
function lastNMonths(n){const t=new Date(),res=[];for(let i=n-1;i>=0;i--){res.push(new Date(t.getFullYear(),t.getMonth()-i,1));}return res;}
function fridaysFrom(startDateStr){
  // Returns Fridays from max(startDate, 2026-06-01) up to current week + 4 weeks ahead
  const minStart=new Date('2026-06-01T12:00:00');
  let start=startDateStr?new Date(startDateStr+'T12:00:00'):new Date(minStart);
  if(start<minStart)start=new Date(minStart);
  start.setHours(0,0,0,0);
  // Advance to first Friday on or after start
  const day=start.getDay();
  const diff=day===5?0:(day<5?5-day:12-day);
  if(diff>0)start.setDate(start.getDate()+diff);
  const current=getCurrentFriday();
  // Show up to 6 months ahead (same horizon as monthsFrom)
  const now2=new Date();
  const futureLimit=new Date(now2.getFullYear(),now2.getMonth()+6,1);
  const res=[];
  const d=new Date(start);
  while(d<=futureLimit){res.push(new Date(d));d.setDate(d.getDate()+7);}
  return res;
}
function monthsFrom(startDateStr){
  // Returns months from max(startDate, June 2026) up to 6 months ahead
  const minStart=new Date(2026,5,1);
  let start=startDateStr?new Date(startDateStr):new Date(2026,5,1);
  const sy=start<minStart?2026:start.getFullYear();
  const sm=start<minStart?5:start.getMonth();
  const cur=new Date();
  // show up to 6 months ahead from today
  const ahead=new Date(cur.getFullYear(),cur.getMonth()+6,1);
  const res=[];
  let y=sy,m=sm;
  while(y<ahead.getFullYear()||(y===ahead.getFullYear()&&m<=ahead.getMonth())){
    res.push(new Date(y,m,1));
    m++;if(m>11){m=0;y++;}
  }
  return res;
}
function currentTrackingMonthKey(){
  // Returns the current relevant month for GP reports (min: Junho 2026)
  const d=new Date();
  if(d.getFullYear()<2026||(d.getFullYear()===2026&&d.getMonth()<5))return'Junho 2026';
  return thisMonthKey();
}
function getMonthlyAlertHtml(){
  // Returns alert HTML if today is day 8-10 (2 days before monthly report deadline)
  const day=new Date().getDate();
  if(day<8||day>10)return'';
  const daysLeft=10-day;
  const mk=currentTrackingMonthKey();
  const msg=daysLeft===0?`Hoje é o último dia para enviar o relatório mensal de <strong>${mk}</strong>!`
    :`Falt${daysLeft===1?'a':'am'} <strong>${daysLeft} dia${daysLeft>1?'s':''}</strong> para a entrega do relatório mensal de <strong>${mk}</strong>.`;
  return`<div style="background:#FEF3C7;border:1px solid #F0D88A;border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400E">
    <span style="font-size:18px">⚠️</span>
    <span>${msg} Certifique-se de enviar para todos os clientes!</span>
  </div>`;
}
function getFridayOfWeek(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const day=d.getDay();
  const diff=day<=5?5-day:5+(7-day);
  d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);
  return d;
}

    <div class="stat"><div class="stat-num">${prodStats.totalAll?Math.round(prodStats.doneAll/prodStats.totalAll*100):0}%</div><div class="stat-lbl">Progresso Geral</div></div>
  </div>`:''}

    <strong style="font-size:11px;color:var(--muted);align-self:center">Status:</strong>
    ${statuses.map(f=>`<span class="fc ${S.statusFilter===f?'active':''}" onclick="S.statusFilter='${f}';render()">${f==='todos'?'Todos':f.charAt(0).toUpperCase()+f.slice(1)}</span>`).join('')}

    <select class="mini" onchange="S.assigneeFilter=this.value;render()">

// CLIENT DETAIL
// ────────────────────────────────────────────────────────────
function rDetail(){
  const c=getC();if(!c)return'';
  const p=prog(c);
  const tabs={entregas:'📦 Entregas',conteudo:'📅 Conteúdo Mensal',encontros:'🤝 Encontros',artes:'📱 Artes',resultados:'📈 Resultados',contrato:'📋 Contrato',pessoal:'👤 Dados',notas:'📝 Notas'};
  const tabHtml=Object.entries(tabs).map(([k,v])=>`<div class="tab ${S.tab===k?'active':''}" onclick="S.tab='${k}';render()">${v}</div>`).join('');
  const statusMap={ativo:'pill-ativo',vencido:'pill-vencido',finalizado:'pill-finalizado'};
  let body='';

  if(S.tab==='entregas'){
    const hasGP=c.products.includes('Gestão de Perfil');
    const hasIC=c.products.includes('Implementação Comercial');
    body='';

    if(hasGP){
      // SECTION 1: Continuous Activities
      const cas=c.continuousActivities||[];
      const caColors={ativo:'#16A34A',pausado:'#D97706',inativo:'#9CA3AF'};
      const caBg={ativo:'#DCFCE7',pausado:'#FEF3C7',inativo:'#F3F4F6'};
      body+=getMonthlyAlertHtml();
      body+=`<div class="card" style="margin-bottom:16px">
        <div class="ch"><h3>🔄 Atividades Contínuas</h3><span style="font-size:11px;color:var(--muted)">Clique para alterar status</span></div>
        <div class="cb" style="display:flex;flex-wrap:wrap;gap:10px">
          ${cas.map(ca=>`<div style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:${caBg[ca.status]};border-radius:8px;cursor:pointer;border:1px solid ${caColors[ca.status]}20" onclick="cycleContinuous('${c.id}','${ca.id}')">
            <span style="width:8px;height:8px;border-radius:50%;background:${caColors[ca.status]};display:inline-block"></span>
            <span style="font-size:13px;font-weight:500;color:${caColors[ca.status]}">${ca.name}</span>
            <span style="font-size:11px;color:${caColors[ca.status]};opacity:.8">${{ativo:'Ativo',pausado:'Pausado',inativo:'Inativo'}[ca.status]} ↻</span>
          </div>`).join('')}
        </div>
      </div>`;

      // SECTION 2: Relatório Semanal
      const allFridays=fridaysFrom(c.startDate);
      const wk=thisWeekKey();
      // Build month list from all fridays
      const monthKeys=[...new Set(allFridays.map(f=>getMonthKey(f)))];
      // Determine active month filter — default to current/closest month
      const defaultMonth=(()=>{
        const curMk=getMonthKey(new Date());
        return monthKeys.includes(curMk)?curMk:monthKeys[0]||curMk;
      })();
      if(!S.weeklyFilterMonth||!monthKeys.includes(S.weeklyFilterMonth))S.weeklyFilterMonth=defaultMonth;
      const fridays=allFridays.filter(f=>getMonthKey(f)===S.weeklyFilterMonth);
      body+=`<div class="card" style="margin-bottom:16px">
        <div class="ch">
          <h3>📊 Relatório Semanal <span style="font-size:11px;font-weight:400;color:var(--muted)">— toda sexta</span></h3>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);background:#FAFAFA">
          ${monthKeys.map(mk=>`<span class="fc ${S.weeklyFilterMonth===mk?'active':''}" onclick="S.weeklyFilterMonth='${mk}';render()" style="font-size:11px">${mk}</span>`).join('')}
        </div>
        <div class="tw"><table><thead><tr><th>Semana (sexta)</th><th>Enviado?</th><th>Leads</th><th>Arquivo / Link</th></tr></thead><tbody>
          ${fridays.length?fridays.map(fri=>{
            const key=getWeekKey(fri);
            const wr=(c.weeklyReports&&c.weeklyReports[key])||{done:false,file:null,link:'',leads:0};
            const isCurrent=key===wk;
            const isFuture=fri>new Date(wk+'T23:59:59');
            const label=fri.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
            const statusColor=isFuture?'#CBD5E1':wr.done?(wr.file||wr.link)?'#16A34A':'#D97706':'#9CA3AF';
            const statusText=isFuture?'📅 Futuro':wr.done?(wr.file||wr.link)?'✅ Enviado':'⚠️ Sem arquivo':'⏳ Pendente';
            return`<tr style="${isCurrent?'background:#EFF6FF;':isFuture?'background:#F8FAFC;opacity:.7;':''}">
              <td><span style="font-size:12px;font-weight:${isCurrent?700:400}">${label}${isCurrent?' ← esta semana':''}</span></td>
              <td><label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" onchange="toggleWeeklyReport('${c.id}','${key}',this.checked)" ${wr.done?'checked':''}>
                <span style="font-size:11px;color:${statusColor}">${statusText}</span>
              </label></td>
              <td><input type="number" class="mini" min="0" value="${wr.leads||0}" style="width:65px" onblur="updateWeeklyLeads('${c.id}','${key}',this.value)" placeholder="0"></td>
              <td style="display:flex;gap:6px;align-items:center">
                ${wr.file?`<span style="font-size:11px;color:var(--primary);cursor:pointer" onclick="downloadRepFile('${c.id}','weekly','${key}')">📎 ${wr.file.name.substring(0,18)}...</span>`:''}
                ${wr.link?`<a href="${wr.link}" target="_blank" style="font-size:11px;color:var(--primary)">🔗 Ver</a>`:''}
                ${!wr.file?`<input class="mini" type="url" placeholder="Link..." style="width:110px" value="${wr.link||''}" onblur="updateWeekReportLink('${c.id}','${key}',this.value)">`:''}
                <button class="btn btn-o btn-s" onclick="document.getElementById('wrf-${c.id}-${key}').click()" title="Upload arquivo">📎</button>
                <input type="file" id="wrf-${c.id}-${key}" style="display:none" accept=".pdf,.jpg,.png,.doc,.docx" onchange="uploadReportFile('${c.id}','weekly','${key}',this)">
              </td>
            </tr>`;
          }).join(''):`<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">Nenhuma semana em ${S.weeklyFilterMonth}</td></tr>`}
        </tbody></table></div>
      </div>`;

      // SECTION 3: Relatório Mensal
      const months=monthsFrom(c.startDate);
      const currMonth=thisMonthKey();
      body+=`<div class="card" style="margin-bottom:16px">
        <div class="ch"><h3>📅 Relatório Mensal <span style="font-size:11px;font-weight:400;color:var(--muted)">— até dia 10</span></h3></div>
        <div class="tw"><table><thead><tr><th>Mês</th><th>Enviado?</th><th>Arquivo / Link</th></tr></thead><tbody>
          ${months.map(m=>{
            const key=getMonthKey(m);
            const mr=(c.monthlyReports&&c.monthlyReports[key])||{done:false,file:null,link:''};
            const isCurrent=key===currMonth;
            const isFuture=m.getFullYear()>new Date().getFullYear()||(m.getFullYear()===new Date().getFullYear()&&m.getMonth()>new Date().getMonth());
            const statusColor=isFuture?'#CBD5E1':mr.done?(mr.file||mr.link)?'#16A34A':'#D97706':'#9CA3AF';
            const statusText=isFuture?'📅 Futuro':mr.done?(mr.file||mr.link)?'✅ Enviado':'⚠️ Sem arquivo':'⏳ Pendente';
            return`<tr style="${isCurrent?'background:#EFF6FF;':isFuture?'background:#F8FAFC;opacity:.7;':''}">
              <td><span style="font-size:12px;font-weight:${isCurrent?700:400}">${key}${isCurrent?' ← este mês':''}</span></td>
              <td><label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" onchange="toggleMonthlyReport('${c.id}','${key}',this.checked)" ${mr.done?'checked':''}>
                <span style="font-size:11px;color:${statusColor}">${statusText}</span>
              </label></td>
              <td style="display:flex;gap:6px;align-items:center">
                ${mr.file?`<span style="font-size:11px;color:var(--primary);cursor:pointer" onclick="downloadRepFile('${c.id}','monthly','${key}')">📎 ${mr.file.name.substring(0,18)}...</span>`:''}
                ${mr.link?`<a href="${mr.link}" target="_blank" style="font-size:11px;color:var(--primary)">🔗 Ver</a>`:''}
                ${!mr.file?`<input class="mini" type="url" placeholder="Link..." style="width:110px" value="${mr.link||''}" onblur="updateMonthReportLink('${c.id}','${key}',this.value)">`:''}
                <button class="btn btn-o btn-s" onclick="document.getElementById('mrf-${c.id}-${key.replace(/\s/g,'_')}').click()" title="Upload">📎</button>
                <input type="file" id="mrf-${c.id}-${key.replace(/\s/g,'_')}" style="display:none" accept=".pdf,.jpg,.png,.doc,.docx" onchange="uploadReportFile('${c.id}','monthly','${key}',this)">
              </td>
            </tr>`;
          }).join('')}
        </tbody></table></div>
      </div>`;
    }

    // IC milestones (kept for IC clients)
    if(hasIC){
      const icDels=c.deliverables.filter(d=>d.product==='Implementação Comercial');
      if(icDels.length){
        const getDayStr=d=>{const dy=getDaysUntil(d.dueDate);if(dy===null)return'—';if(dy<0)return`${Math.abs(dy)}d atrasado`;if(dy===0)return'Hoje';if(dy===1)return'Amanhã';return`${dy}d`;};
        const pct=Math.round(icDels.filter(d=>d.status==='concluido').length/icDels.length*100);
        body+=`<div class="card">
          <div class="ch"><h3>🏆 Implementação Comercial — Marcos</h3>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:11px;color:var(--muted)">${icDels.filter(d=>d.status==='concluido').length}/${icDels.length}</span>
              <div style="width:70px;background:#E5E7EB;border-radius:99px;height:5px"><div style="width:${pct}%;height:5px;border-radius:99px;background:var(--primary)"></div></div>
            </div>
          </div>
          <div class="tw"><table><thead><tr><th>Entrega</th><th>Vencimento</th><th>Responsável</th><th>Status</th></tr></thead><tbody>
            ${icDels.map(d=>`<tr>
              <td>${d.name}</td>
              <td><input type="date" class="mini" value="${d.dueDate||''}" onchange="updDel('${c.id}','${d.id}','dueDate',this.value)" style="width:130px"><span style="font-size:10px;color:var(--muted);margin-left:8px">${getDayStr(d)}</span></td>
              <td><select class="mini" onchange="updDel('${c.id}','${d.id}','responsible',this.value)">
                <option value="">— Selecionar —</option>
                ${TEAM_NAMES().map(n=>`<option value="${n}" ${d.responsible===n?'selected':''}>${n.split(' ')[0]}</option>`).join('')}
              </select></td>
              <td><span class="badge ${getDelClassByDate(d)}" onclick="cycleDel('${c.id}','${d.id}')" title="Clique para alterar">${getDelStatusByDate(d)==='atrasado'?'❌ Atrasado':SL(d.status)} ↻</span></td>
            </tr>`).join('')}
          </tbody></table></div>
        </div>`;
      }
    }
  }
  else if(S.tab==='conteudo'){
    const months=Object.keys(c.monthlyContent);

          <h4>${wk}</h4><span class="badge ${SC(st)}">${SL(st)}</span>
        </div>`).join('')}
      </div></div>
    </div>`).join('')+
    `<button class="btn btn-o btn-s" style="margin-bottom:16px" onclick="addMonth('${c.id}')">+ Novo mês</button>
    <div class="card"><div class="ch"><h3>🎯 Encontros Coletivos</h3><span style="font-size:12px;color:var(--muted)">${c.encounters.completed}/${c.encounters.total} realizados</span></div>
    <div class="cb"><div class="enc-grid">${Array.from({length:c.encounters.total},(_,i)=>`<div class="enc ${i<c.encounters.completed?'ed':'ep'}" onclick="toggleEnc('${c.id}',${i+1})">${i+1}</div>`).join('')}</div></div></div>`;
  }
  else if(S.tab==='encontros'){
    const encs=c.encounters.list||[];
    const hasIC=c.products.includes('Implementação Comercial');
    if(hasIC){
      const realizados=Math.min(encs.length,3);
      const pct=Math.round(realizados/3*100);
      body=`
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <h3 style="margin:0;font-size:15px;font-weight:700">🤝 3 Encontros Individuais — IC</h3>
          <span style="font-size:13px;color:var(--muted);font-weight:600">${realizados}/3 realizados</span>
        </div>
        <div style="height:6px;background:#E5E7EB;border-radius:3px;margin-bottom:20px">
          <div style="height:6px;background:var(--primary);border-radius:3px;width:${pct}%;transition:width .3s"></div>

              ${enc.description?`<div style="font-size:12px;color:var(--text);background:#F8FAFF;padding:8px 10px;border-radius:6px;border-left:3px solid var(--primary);margin-bottom:10px;line-height:1.5">${enc.description.length>120?enc.description.substring(0,120)+'…':enc.description}</div>`:''}
              <div style="display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--border);padding-top:10px">
                ${enc.transcriptionLink?`<a href="${enc.transcriptionLink}" target="_blank" style="font-size:12px;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:5px">📝 <span style="text-decoration:underline">Ver Transcrição ↗</span></a>`:`<span style="font-size:12px;color:#CBD5E1">📝 Sem transcrição</span>`}

                ${enc.attachments&&enc.attachments.length?`<span style="font-size:12px;color:var(--muted);cursor:pointer" onclick="openEncounterModal('${c.id}','${i}')">📸 ${enc.attachments.length} foto(s) — ver</span>`:`<span style="font-size:12px;color:#CBD5E1">📸 Sem foto</span>`}

function getWeeklyPendencies(){
  const today=new Date();today.setHours(0,0,0,0);
  const weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+7);
  const grouped={};
  D.clients.forEach(c=>{
    c.deliverables.forEach(d=>{
      if(d.status!=='pendente'&&d.status!=='atrasado')return;
      const days=getDaysUntil(d.dueDate);
      if(d.status==='atrasado'||days!==null&&days>=0&&days<=7){
        const assignee=d.responsible||'Sem responsável';
        if(!grouped[assignee])grouped[assignee]={};
        if(!grouped[assignee][c.id])grouped[assignee][c.id]={client:c,deliverables:[]};
        grouped[assignee][c.id].deliverables.push(d);
      }
    });
  });
  return grouped;
}

function rWeeklyPending(){
  const wk=S.semanaWeekKey||thisWeekKey();
  const mk=currentTrackingMonthKey();
  const wkDate=new Date(wk+'T12:00:00');
  const wkLabel=wkDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  // Date picker value = Friday of selected week (yyyy-mm-dd)
  const pickerVal=wk;

  const totalClients=D.clients.filter(c=>c.contractStatus!=='inativo'&&c.products.includes('Gestão de Perfil'));

  const allSemanaisDone=totalClients.filter(c=>c.weeklyReports&&c.weeklyReports[wk]&&c.weeklyReports[wk].done).length;
  const allMensaisDone=totalClients.filter(c=>c.monthlyReports&&c.monthlyReports[mk]&&c.monthlyReports[mk].done).length;
  const totalLeads=totalClients.reduce((sum,c)=>sum+(c.weeklyReports&&c.weeklyReports[wk]?c.weeklyReports[wk].leads||0:0),0);

  const memberCards=D.team.filter(m=>m.id!=='mariana-souza'&&m.id!=='naiara-faria').map(member=>{
    const myClients=D.clients.filter(c=>c.assignees&&c.assignees.includes(member.name)&&c.contractStatus!=='inativo'&&c.products.includes('Gestão de Perfil'));
    if(!myClients.length)return'';
    const semDone=myClients.filter(c=>c.weeklyReports&&c.weeklyReports[wk]&&c.weeklyReports[wk].done).length;
    const menDone=myClients.filter(c=>c.monthlyReports&&c.monthlyReports[mk]&&c.monthlyReports[mk].done).length;
    const leads=myClients.reduce((s,c)=>s+(c.weeklyReports&&c.weeklyReports[wk]?c.weeklyReports[wk].leads||0:0),0);
    const allOk=semDone===myClients.length&&menDone===myClients.length;

    return`<div class="card" style="margin-bottom:16px">
      <div class="ch" style="background:#F9FAFB">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="av av-s" style="background:${member.color}">${member.initials}</div>
          <div>
            <h3 style="margin:0;font-size:14px">${member.name.split(' ')[0]} ${member.name.split(' ')[1]||''}</h3>
            <div style="font-size:11px;color:var(--muted)">${myClients.length} clientes</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center">
          <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:${semDone===myClients.length?'#16A34A':'#D97706'}">${semDone}/${myClients.length}</div><div style="font-size:10px;color:var(--muted)">Semanais</div></div>
          <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:#3B82F6">${leads}</div><div style="font-size:10px;color:var(--muted)">Leads</div></div>
          <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:${menDone===myClients.length?'#16A34A':'#D97706'}">${menDone}/${myClients.length}</div><div style="font-size:10px;color:var(--muted)">Mensais</div></div>
          <span style="padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;background:${allOk?'#DCFCE7':'#FEF3C7'};color:${allOk?'#16A34A':'#D97706'}">${allOk?'✅ Em dia':'⚠️ Pendências'}</span>
        </div>
      </div>
      <div class="tw"><table>
        <thead><tr><th>Cliente</th><th>Rel. Semanal</th><th>Leads</th><th>Rel. Mensal</th><th>Contínuos</th></tr></thead>
        <tbody>
          ${myClients.map(c=>{
            const wr=(c.weeklyReports&&c.weeklyReports[wk])||{done:false,file:null,link:'',leads:0};
            const mr=(c.monthlyReports&&c.monthlyReports[mk])||{done:false,file:null,link:''};
            const cas=c.continuousActivities||[];
            const activosCount=cas.filter(a=>a.status==='ativo').length;
            const wrColor=wr.done?(wr.file||wr.link)?'#16A34A':'#D97706':'#9CA3AF';
            const mrColor=mr.done?(mr.file||mr.link)?'#16A34A':'#D97706':'#9CA3AF';
            const wrStatus=wr.done?(wr.file||wr.link)?'✅':'⚠️':'⏳';
            const mrStatus=mr.done?(mr.file||mr.link)?'✅':'⚠️':'⏳';
            return`<tr onclick="nav('clients',{clientId:'${c.id}',tab:'entregas'})" style="cursor:pointer">
              <td><div style="font-weight:500;font-size:12px">${c.name.split(' ').slice(0,2).join(' ')}</div></td>
              <td><span style="font-size:13px;color:${wrColor}">${wrStatus} ${wr.done?'Enviado':'Pendente'}</span>${wr.done&&!wr.file&&!wr.link?'<span style="font-size:10px;color:#D97706"> sem arquivo</span>':''}</td>
              <td><span style="font-weight:600;color:#3B82F6">${wr.leads||0}</span></td>
              <td><span style="font-size:13px;color:${mrColor}">${mrStatus} ${mr.done?'Enviado':'Pendente'}</span>${mr.done&&!mr.file&&!mr.link?'<span style="font-size:10px;color:#D97706"> sem arquivo</span>':''}</td>
              <td><span style="font-size:11px;color:${activosCount===cas.length?'#16A34A':'#D97706'}">${activosCount}/${cas.length} ativos</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>`;
  }).join('');

  const isCurrentWeek=wk===thisWeekKey();
  return`<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
    <div class="stat-card"><div class="stat-val">${allSemanaisDone}/${totalClients.length}</div><div class="stat-label">Rel. Semanais da semana</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#16A34A">${totalLeads}</div><div class="stat-label">Total de leads</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#D97706">${allMensaisDone}/${totalClients.length}</div><div class="stat-label">Rel. Mensais (${mk})</div></div>
  </div>
  <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div style="font-size:13px;color:#1D4ED8">
      📅 <strong>Reunião de Sexta</strong> — Semana ${wkLabel} &nbsp;|&nbsp; ${D.clients.filter(c=>c.contractStatus!=='inativo').length} clientes ativos
      ${!isCurrentWeek?'<span style="margin-left:8px;padding:2px 8px;background:#FEF3C7;color:#D97706;border-radius:99px;font-size:11px;font-weight:600">semana anterior</span>':''}
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:11px;font-weight:600;color:#1D4ED8;white-space:nowrap">📆 Filtrar semana:</label>
      <input type="date" value="${pickerVal}" onchange="filterSemanaWeek(this.value)" style="padding:5px 8px;border:1px solid #BFDBFE;border-radius:6px;font-size:12px;background:white;cursor:pointer;color:#1D4ED8">
      ${!isCurrentWeek?`<button class="btn btn-o btn-s" onclick="S.semanaWeekKey=null;render()" style="white-space:nowrap">↩ Semana atual</button>`:''}
    </div>
  </div>
  ${memberCards||'<div class="card"><p style="color:var(--muted)">Nenhuma funcionária com clientes atribuídos.</p></div>'}`;
}

// ────────────────────────────────────────────────────────────
// POR FUNCIONÁRIA
// ────────────────────────────────────────────────────────────
function rFunc(){
  const wk=thisWeekKey();
  const mk=currentTrackingMonthKey();
  const cards=D.team.map(m=>{
    const myClients=D.clients.filter(c=>c.assignees.includes(m.name)&&c.contractStatus==='ativo');
    const gpClients=myClients.filter(c=>c.products.includes('Gestão de Perfil'));
    const icClients=myClients.filter(c=>c.products.includes('Implementação Comercial')&&!c.products.includes('Gestão de Perfil'));
    const capPct=Math.min(Math.round(myClients.length/(m.capacity||10)*100),100);
    const capColor=capPct<70?'var(--green)':capPct<90?'var(--yellow)':'var(--red)';
    // GP stats for this week
    const semDone=gpClients.filter(c=>c.weeklyReports&&c.weeklyReports[wk]&&c.weeklyReports[wk].done).length;
    const menDone=gpClients.filter(c=>c.monthlyReports&&c.monthlyReports[mk]&&c.monthlyReports[mk].done).length;
    const leads=gpClients.reduce((s,c)=>s+(c.weeklyReports&&c.weeklyReports[wk]?c.weeklyReports[wk].leads||0:0),0);
    // IC milestones
    const icDels=myClients.flatMap(c=>c.deliverables.filter(d=>d.product==='Implementação Comercial'&&d.responsible===m.name));
    const icDone=icDels.filter(d=>d.status==='concluido').length;
    const icPend=icDels.filter(d=>d.status==='pendente').length;

    return`<div class="card">
      <div class="ch">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="av av-s" style="background:${m.color}">${m.initials}</div>
          <div><strong style="font-size:13px">${m.name}</strong><br><span style="font-size:11px;color:var(--muted)">${m.role} · ${m.dept}</span></div>
        </div>
        <button class="btn btn-o btn-s" onclick="nav('team')">Perfil →</button>
      </div>
      <div class="cb">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
          <div style="background:#F9FAFB;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:var(--primary)">${myClients.length}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase">Clientes</div>
          </div>
          <div style="background:#F9FAFB;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:${capColor}">${capPct}%</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase">Capacidade</div>
          </div>
          <div style="background:#F9FAFB;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:#3B82F6">${leads}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase">Leads semana</div>
          </div>
        </div>
        ${gpClients.length?`
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Gestão de Perfil — esta semana (${gpClients.length} clientes)</div>
        <div style="display:flex;gap:12px;margin-bottom:12px">
          <div style="flex:1;background:${semDone===gpClients.length?'#DCFCE7':'#FEF3C7'};border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:15px;font-weight:700;color:${semDone===gpClients.length?'#16A34A':'#D97706'}">${semDone}/${gpClients.length}</div>
            <div style="font-size:10px;color:var(--muted)">Semanais enviados</div>
          </div>
          <div style="flex:1;background:${menDone===gpClients.length?'#DCFCE7':'#FEF3C7'};border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:15px;font-weight:700;color:${menDone===gpClients.length?'#16A34A':'#D97706'}">${menDone}/${gpClients.length}</div>
            <div style="font-size:10px;color:var(--muted)">Mensais (${mk})</div>
          </div>
        </div>`:''}
        ${icClients.length?`
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Impl. Comercial (${icDels.length} marcos)</div>
        <div style="font-size:11px;margin-bottom:10px"><span style="color:#16A34A">✅ ${icDone} concluídos</span> · <span style="color:#9CA3AF">⏳ ${icPend} pendentes</span></div>`:''}
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Disponibilidade (${myClients.length}/${m.capacity||10} clientes)</div>
        <div class="cap-bar"><div class="cap-fill" style="width:${capPct}%;background:${capColor}"></div></div>
        ${myClients.length?`
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.5px">Carteira</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${myClients.map(c=>`<span class="tag" style="cursor:pointer;font-size:11px" onclick="nav('clients',{clientId:'${c.id}',tab:'entregas'})">${c.name.split(' ')[0]} ${c.name.split(' ')[1]||''}</span>`).join('')}
        </div>`:`<div style="font-size:12px;color:var(--muted);margin-top:10px">Nenhum cliente atribuído.</div>`}
      </div>
    </div>`;
  }).join('');

  const totalClients=D.clients.filter(c=>c.contractStatus==='ativo').length;
  const assigned=D.clients.filter(c=>c.assignees.length>0&&c.contractStatus==='ativo').length;
  const unassigned=totalClients-assigned;

  return`
  <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="stat"><div class="stat-num">${D.team.length}</div><div class="stat-lbl">Funcionárias</div></div>
    <div class="stat"><div class="stat-num">${assigned}</div><div class="stat-lbl">Clientes Atribuídos</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--yellow)">${unassigned}</div><div class="stat-lbl">Sem Responsável</div></div>
    <div class="stat"><div class="stat-num">${totalClients>0?Math.round(assigned/totalClients*100):0}%</div><div class="stat-lbl">Cobertura</div></div>
  </div>
  ${unassigned>0?`<div class="card" style="margin-bottom:18px;border-color:var(--border)"><div class="ch" style="background:#FFFBEB"><h3>⚠️ ${unassigned} clientes sem responsável atribuído</h3><button class="btn btn-o btn-s" onclick="nav('clients')">Atribuir agora →</button></div></div>`:''}
  <div class="sh"><h2>Visão por Funcionária</h2></div>
  <div class="grid2">${cards}</div>`;
}

// ────────────────────────────────────────────────────────────
// MINHA SEMANA
// ────────────────────────────────────────────────────────────
function rMinhaSemana(){
  const user=S.currentUser;
  if(!user)return'<div class="card"><p>Faça login para ver sua semana.</p></div>';
  const myClients=D.clients.filter(c=>c.assignees&&c.assignees.includes(user.name)&&c.contractStatus!=='inativo'&&c.products.includes('Gestão de Perfil'));

  // Collect all unique Fridays across user's clients (sorted)
  const allFriKeys=[...new Set(myClients.flatMap(c=>fridaysFrom(c.startDate).map(f=>getWeekKey(f))))].sort();
  const allFriDates=allFriKeys.map(k=>new Date(k+'T12:00:00'));

  // Month list
  const monthKeys=[...new Set(allFriDates.map(f=>getMonthKey(f)))];
  const curMonthKey=getMonthKey(new Date());
  if(!S.minhaSemanaFilterMonth||!monthKeys.includes(S.minhaSemanaFilterMonth)){
    S.minhaSemanaFilterMonth=monthKeys.includes(curMonthKey)?curMonthKey:(monthKeys[0]||curMonthKey);
  }

  // Fridays for selected month
  const monthFriKeys=allFriKeys.filter(k=>getMonthKey(new Date(k+'T12:00:00'))===S.minhaSemanaFilterMonth);

  // Selected week (default to current week if in month, else last of month)
  const thisWk=thisWeekKey();
  if(!S.minhaSemanaWk||!monthFriKeys.includes(S.minhaSemanaWk)){
    S.minhaSemanaWk=monthFriKeys.includes(thisWk)?thisWk:(monthFriKeys[monthFriKeys.length-1]||thisWk);
  }

  const wk=S.minhaSemanaWk;
  const wkDate=new Date(wk+'T12:00:00');
  const wkLabel=wkDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const mk=currentTrackingMonthKey();
  const semanaisDone=myClients.filter(c=>c.weeklyReports&&c.weeklyReports[wk]&&c.weeklyReports[wk].done).length;
  const mensaisDone=myClients.filter(c=>c.monthlyReports&&c.monthlyReports[mk]&&c.monthlyReports[mk].done).length;
  const totalLeads=myClients.reduce((sum,c)=>sum+(c.weeklyReports&&c.weeklyReports[wk]?c.weeklyReports[wk].leads||0:0),0);
  // Due date badge for monthly (vence dia 10) — baseado no mês rastreado (mk), não no mês atual
  const today=new Date();
  const _ptMon={'Janeiro':0,'Fevereiro':1,'Março':2,'Abril':3,'Maio':4,'Junho':5,'Julho':6,'Agosto':7,'Setembro':8,'Outubro':9,'Novembro':10,'Dezembro':11};
  const _mkParts=mk.split(' ');// ["Junho","2026"]
  const _mkMonth=_ptMon[_mkParts[0]]??today.getMonth();
  const _mkYear=parseInt(_mkParts[1])||today.getFullYear();
  const dueDay10=new Date(_mkYear,_mkMonth,10);
  const daysUntil10=Math.ceil((dueDay10-today)/(1000*60*60*24));
  const monthDueBadge=daysUntil10<0
    ?`<span style="background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">⚠️ Prazo encerrado</span>`
    :daysUntil10<=3
      ?`<span style="background:#FEF3C7;color:#D97706;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">⏰ Vence em ${daysUntil10} dia${daysUntil10===1?'':'s'}</span>`
      :`<span style="background:#DCFCE7;color:#16A34A;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">📅 Vence dia 10/${String(_mkMonth+1).padStart(2,'0')}</span>`;

  return`
  ${getMonthlyAlertHtml()}
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
    <div class="stat-card"><div class="stat-val" style="color:var(--primary)">${semanaisDone}/${myClients.length}</div><div class="stat-label">Semanais enviados</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#16A34A">${totalLeads}</div><div class="stat-label">Leads esta semana</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#D97706">${mensaisDone}/${myClients.length}</div><div class="stat-label">Mensais ${mk}</div></div>
  </div>

  <!-- Filtro de Mês -->
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px">
    <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-right:4px">Mês:</span>
    ${monthKeys.map(m=>`<span class="fc ${S.minhaSemanaFilterMonth===m?'active':''}" onclick="S.minhaSemanaFilterMonth='${m}';S.minhaSemanaWk=null;render()" style="font-size:11px">${m}</span>`).join('')}
  </div>

  <!-- Filtro de Semana -->
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px">
    <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-right:4px">Semana:</span>
    ${monthFriKeys.length===0?'<span style="font-size:11px;color:var(--muted)">Nenhuma sexta neste mês</span>':
      monthFriKeys.map(fk=>{
        const fd=new Date(fk+'T12:00:00');
        const lbl='Sexta '+fd.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        const isCur=fk===thisWk;
        return`<span class="fc ${S.minhaSemanaWk===fk?'active':''}" onclick="S.minhaSemanaWk='${fk}';render()" style="font-size:11px">${lbl}${isCur?' 📍':''}</span>`;
      }).join('')}
  </div>

  <!-- SEÇÃO 1: Relatórios Semanais -->
  <div class="card" style="margin-bottom:20px">
    <div class="ch" style="background:linear-gradient(135deg,var(--primary),#1d4ed8);border-radius:8px 8px 0 0">
      <h3 style="margin:0;color:white">⚡ Relatórios Semanais — Sexta ${wkLabel}</h3>
      <span style="font-size:12px;color:rgba(255,255,255,.8)">${semanaisDone}/${myClients.length} enviados</span>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Cliente</th><th>Status</th><th>Leads</th><th>Arquivo / Link</th></tr></thead>
      <tbody>
        ${myClients.map(c=>{
          const wr=(c.weeklyReports&&c.weeklyReports[wk])||{done:false,file:null,link:'',leads:0};
          return`<tr>
            <td><div style="font-weight:600;font-size:13px">${c.name.split(' ').slice(0,2).join(' ')}</div></td>
            <td><label style="display:flex;align-items:center;gap:6px;cursor:pointer">
              <input type="checkbox" onchange="toggleWeeklyReport('${c.id}','${wk}',this.checked)" ${wr.done?'checked':''}>
              <span style="font-size:11px;color:${wr.done?'#16A34A':'#9CA3AF'}">${wr.done?'✅ Enviado':'⏳ Pendente'}</span>
            </label></td>
            <td><input type="number" class="mini" min="0" value="${wr.leads||0}" style="width:65px;text-align:center" onblur="updateWeeklyLeads('${c.id}','${wk}',this.value)" placeholder="0"></td>
            <td>
              ${wr.file?`<span style="font-size:11px;color:var(--primary);cursor:pointer" onclick="downloadRepFile('${c.id}','weekly','${wk}')">📎 ${wr.file.name.substring(0,15)}...</span>`:
                wr.link?`<a href="${wr.link}" target="_blank" style="font-size:11px;color:var(--primary)">🔗 Link</a>`:''}
              <div style="display:flex;gap:4px;margin-top:4px">
                <button class="btn btn-o btn-s" onclick="document.getElementById('ms-wf-${c.id}-${wk}').click()">📎</button>
                <input type="file" id="ms-wf-${c.id}-${wk}" style="display:none" accept=".pdf,.jpg,.png,.doc,.docx" onchange="uploadReportFile('${c.id}','weekly','${wk}',this)">
                <input class="mini" type="url" placeholder="Link..." style="width:110px" value="${wr.link||''}" onblur="updateWeekReportLink('${c.id}','${wk}',this.value)">
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>

  <!-- SEÇÃO 2: Relatório Mensal (fixo, independente da semana) -->
  <div class="card" style="margin-bottom:16px">
    <div class="ch" style="background:linear-gradient(135deg,#D97706,#F59E0B);border-radius:8px 8px 0 0">
      <div>
        <h3 style="margin:0;color:white">📊 Relatório Mensal — ${mk}</h3>
        <span style="font-size:12px;color:rgba(255,255,255,.85)">Enviado uma vez por mês · ${mensaisDone}/${myClients.length} concluídos</span>
      </div>
      ${monthDueBadge}
    </div>
    <div class="tw"><table>
      <thead><tr><th>Cliente</th><th>Status</th><th>Arquivo / Link</th></tr></thead>
      <tbody>
        ${myClients.map(c=>{
          const mr=(c.monthlyReports&&c.monthlyReports[mk])||{done:false,file:null,link:''};
          return`<tr>
            <td><div style="font-weight:600;font-size:13px">${c.name.split(' ').slice(0,2).join(' ')}</div></td>
            <td><label style="display:flex;align-items:center;gap:6px;cursor:pointer">
              <input type="checkbox" onchange="toggleMonthlyReport('${c.id}','${mk}',this.checked)" ${mr.done?'checked':''}>
              <span style="font-size:11px;color:${mr.done?'#16A34A':'#9CA3AF'}">${mr.done?(mr.file||mr.link)?'✅ Enviado':'⚠️ Sem arquivo':'⏳ Pendente'}</span>
            </label></td>

function cycleDel(cid,did){const d=D.clients.find(c=>c.id===cid).deliverables.find(d=>d.id===did);d.status=CS(d.status);save();render()}
function updDel(cid,did,f,v){D.clients.find(c=>c.id===cid).deliverables.find(d=>d.id===did)[f]=v;save()}
function cycleContinuous(cid,caId){const c=D.clients.find(c=>c.id===cid);const ca=c.continuousActivities.find(a=>a.id===caId);const s=['ativo','pausado','inativo'];ca.status=s[(s.indexOf(ca.status)+1)%s.length];save();render();}
function toggleWeeklyReport(cid,wk,done){const c=D.clients.find(c=>c.id===cid);if(!c.weeklyReports[wk])c.weeklyReports[wk]={done:false,file:null,link:'',leads:0};c.weeklyReports[wk].done=done;save();render();}
function toggleMonthlyReport(cid,mk,done){const c=D.clients.find(c=>c.id===cid);if(!c.monthlyReports[mk])c.monthlyReports[mk]={done:false,file:null,link:''};c.monthlyReports[mk].done=done;save();render();}
function updateWeeklyLeads(cid,wk,v){const c=D.clients.find(c=>c.id===cid);if(!c.weeklyReports[wk])c.weeklyReports[wk]={done:false,file:null,link:'',leads:0};c.weeklyReports[wk].leads=parseInt(v)||0;save();}
function updateWeekReportLink(cid,wk,v){const c=D.clients.find(c=>c.id===cid);if(!c.weeklyReports[wk])c.weeklyReports[wk]={done:false,file:null,link:'',leads:0};c.weeklyReports[wk].link=v;save();}
function updateMonthReportLink(cid,mk,v){const c=D.clients.find(c=>c.id===cid);if(!c.monthlyReports[mk])c.monthlyReports[mk]={done:false,file:null,link:''};c.monthlyReports[mk].link=v;save();}
function uploadReportFile(cid,type,key,input){
  const f=input.files[0];if(!f)return;
  const c=D.clients.find(c=>c.id===cid);
  const reader=new FileReader();
  reader.onload=e=>{
    if(type==='weekly'){if(!c.weeklyReports[key])c.weeklyReports[key]={done:true,file:null,link:'',leads:0};c.weeklyReports[key].file={name:f.name,type:f.type,data:e.target.result};c.weeklyReports[key].done=true;}
    else{if(!c.monthlyReports[key])c.monthlyReports[key]={done:true,file:null,link:''};c.monthlyReports[key].file={name:f.name,type:f.type,data:e.target.result};c.monthlyReports[key].done=true;}
    save();render();toast('📎 Arquivo enviado!');
  };
  reader.readAsDataURL(f);
}
function downloadRepFile(cid,type,key){
  const c=D.clients.find(c=>c.id===cid);
  const obj=type==='weekly'?c.weeklyReports[key]:c.monthlyReports[key];
  if(obj&&obj.file){const a=document.createElement('a');a.href=obj.file.data;a.download=obj.file.name;a.click();}
}
function cycleWeek(cid,m,wk){const c=D.clients.find(c=>c.id===cid);c.monthlyContent[m][wk]=CS(c.monthlyContent[m][wk]);save();render()}
function toggleEnc(cid,n){const c=D.clients.find(c=>c.id===cid);c.encounters.completed=c.encounters.completed>=n?n-1:n;if(c.encounters.completed<0)c.encounters.completed=0;save();render()}
function addMonth(cid){const m=prompt('Nome do mês (ex: Junho 2026):');if(!m)return;D.clients.find(c=>c.id===cid).monthlyContent[m]={'1ª Semana':'pendente','2ª Semana':'pendente','3ª Semana':'pendente','4ª Semana':'pendente'};save();render()}
function addWeek(cid,m){const c=D.clients.find(c=>c.id===cid);const n=Object.keys(c.monthlyContent[m]).length+1;c.monthlyContent[m][n+'ª Semana']='pendente';save();render()}
function savePessoal(cid){
  const c=D.clients.find(c=>c.id===cid);
  c.name=$('fp-n').value;c.email=$('fp-e').value;c.phone=$('fp-p').value;
  c.linkedin=$('fp-l').value;
  c.initials=initials(c.name);save();toast('✅ Dados salvos!');render();
}
function saveContrato(cid){
  const c=D.clients.find(c=>c.id===cid);
  c.products=['Gestão de Perfil','Implementação Comercial','Mentoria','Consultoria'].filter(p=>document.getElementById('ctp-'+p.replace(/[\s\/]/g,'-'))?.checked);
  c.contractStatus=$('ct-cs').value;
  const cdv=$('ct-cd').value;c.contractDue=cdv?new Date(cdv).getTime():null;
  c.startDate=$('ct-sd').value;
  c.contractValue=$('ct-val').value;
  c.paymentMethod=$('ct-pm').value;
  c.paymentStatus=$('ct-ps').value;
  const newAsgn=$('ct-asgn').value;
  c.assignees=newAsgn?[newAsgn]:[];
  c.mainOwner=newAsgn;
  c.nicho=$('ct-ni').value;
  c.cnpj=$('ct-cnpj').value;
  c.address=$('ct-addr').value;

  const fileInput=$('contract-file');
  if(fileInput&&fileInput.files.length>0){
    const file=fileInput.files[0];
    const reader=new FileReader();
    reader.onload=function(e){
      c.contractFile={name:file.name,type:file.type,data:e.target.result};
      save();toast('✅ Contrato e arquivo salvos!');render();
    };
    reader.readAsDataURL(file);
  }else{
    save();toast('✅ Contrato salvo!');render();
  }
}

  const cdv=$('nc-cd').value;
  const c=mkClient(name,i,prods,$('nc-cs').value,cdv?new Date(cdv).getTime():null,$('nc-as').value?[$('nc-as').value]:[]);
  c.email=$('nc-e').value;c.phone=$('nc-p').value;c.linkedin=$('nc-l').value;

  c.startDate=$('nc-sd').value;c.contractValue=$('nc-val').value;

  nav('clients',{clientId:c.id,tab:'entregas'});toast('✅ Cliente adicionado!');
  // Abrir email de boas-vindas com as credenciais
  if(c.email && c.birthday){
    const firstName=c.name.split(' ')[0];
    const portalUrl=window.location.origin+window.location.pathname+'#portal';
    const formatBd=(bd)=>{if(!bd)return'sua data de nascimento';if(bd.includes('-')){const[y,m,d]=bd.split('-');return`${d}/${m}/${y}`;}return bd;};
    const senha=formatBd(c.birthday);
    const subject=encodeURIComponent('Seu acesso ao Portal All In');
    const body=encodeURIComponent(`Olá, ${firstName}!\n\nSeu acesso ao Portal All In está pronto. Acesse abaixo:\n\n🌐 Link: ${portalUrl}\n📧 Email: ${c.email}\n🔑 Senha: ${senha}\n\nNo portal você acompanha suas entregas, resultados e próximas reuniões.\n\nQualquer dúvida, estou à disposição!\n\nAbraços,\nMari`);
    setTimeout(()=>{window.open(`mailto:${c.email}?subject=${subject}&body=${body}`);},800);
  }
}

function removeEncAttachment(cid,encIdx,attIdx){

function saveEncounter(cid,encIdx){
  const c=D.clients.find(c=>c.id===cid);
  const date=$('em-date').value;
  if(!date){toast('⚠️ Informe a data do encontro!');return;}
  const tnames=TEAM_NAMES();
  const attendees=[];
  tnames.forEach((n,i)=>{if($(`em-att-${i}`)?.checked)attendees.push(n);});
  const description=$('em-desc').value.trim();
  const notes=$('em-notes').value.trim();
  const transcriptionLink=($('em-transcription')?.value||'').trim();
  const recordingLink=($('em-recording')?.value||'').trim();
  const encounter={date,description,attendees,notes,transcriptionLink,recordingLink,attachments:encIdx!=='null'&&encIdx!==undefined?c.encounters.list[encIdx].attachments:[]};
  if(encIdx!=='null'&&encIdx!==undefined){
    c.encounters.list[encIdx]=encounter;
  }else{
    if(!c.encounters.list)c.encounters.list=[];
    c.encounters.list.push(encounter);
  }
  save();closeEncounterModal();toast('✅ Encontro salvo!');render();

}
function downloadEncFile(cid,encIdx,fileIdx){
  const c=D.clients.find(c=>c.id===cid);
  const file=c.encounters.list[encIdx].attachments[fileIdx];
  if(file&&file.data){
    const link=document.createElement('a');
    link.href=file.data;
    link.download=file.name;
    link.click();
  }
}

function openArtModal(cid){
  const c=D.clients.find(c=>c.id===cid);
  if(!c)return;
  const isEdit=false;
  const html=`<div class="overlay" id="art-overlay" onclick="if(event.target===this)closeArtModal()">
    <div class="modal" style="max-width:520px">
      <div class="modal-hd"><h3>📱 Adicionar Arte</h3><button class="btn btn-o btn-s" onclick="closeArtModal()">✕</button></div>
      <div class="modal-body">
        <div class="fgrid">
          <div class="fg"><label>Título da Arte *</label><input id="art-title" placeholder="Ex: Post Instagram #5"></div>
          <div class="fg"><label>Rede Social *</label>
            <select id="art-platform">
              <option value="">— Selecionar —</option>
              <option value="instagram">Instagram</option>
              <option value="linkedin">LinkedIn</option>
              <option value="facebook">Facebook</option>
              <option value="tiktok">TikTok</option>
            </select>
          </div>
        </div>
        <div class="fg" style="grid-column:1/-1"><label>Descrição</label><textarea id="art-desc" style="height:80px" placeholder="Descrição do conteúdo..."></textarea></div>
        <div class="fg" style="grid-column:1/-1"><label>📸 Imagem da Arte *</label>
          <input type="file" id="art-file" accept=".jpg,.jpeg,.png" style="display:none">
          <button class="btn btn-o btn-s" style="width:100%;margin-bottom:8px" onclick="document.getElementById('art-file').click()">+ Enviar Imagem</button>
          <div id="art-preview"></div>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn btn-o" onclick="closeArtModal()">Cancelar</button>
        <button class="btn btn-p" onclick="saveArt('${cid}')">✅ Enviar para Aprovação</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  const fileInput=$('art-file');
  if(fileInput){
    fileInput.addEventListener('change',function(){
      if(!this.files.length)return;
      const f=this.files[0];
      const reader=new FileReader();
      reader.onload=e=>{
        const preview=$('art-preview');
        preview.innerHTML=`<img src="${e.target.result}" style="max-width:100%;border-radius:8px;max-height:200px;display:block;margin-bottom:8px"><button class="btn btn-o btn-s" style="border-color:var(--red);color:var(--red)" onclick="$('art-file').value='';$('art-preview').innerHTML=''">🗑️ Remover</button>`;
        window.artImageData=e.target.result;
      };
      reader.readAsDataURL(f);
    });
  }
}

function closeArtModal(){const el=$('art-overlay');if(el)el.remove();window.artImageData=null;}

function saveArt(cid){
  const c=D.clients.find(c=>c.id===cid);
  if(!c)return;
  const title=$('art-title')?.value?.trim();
  const platform=$('art-platform')?.value;
  const desc=$('art-desc')?.value?.trim();
  if(!title||!platform||!window.artImageData){toast('⚠️ Preencha título, rede social e imagem!');return;}
  if(!c.arts)c.arts=[];
  c.arts.push({
    id:'art_'+Date.now(),
    title,platform,description:desc||'',
    image:window.artImageData,
    status:'pendente',
    createdAt:new Date().toISOString(),
    feedback:''
  });
  save();closeArtModal();toast('✅ Arte enviada para aprovação!');render();
}

function deleteArt(cid,artId){
  if(!confirm('Remover esta arte?'))return;
  const c=D.clients.find(c=>c.id===cid);
  if(c)c.arts=c.arts.filter(a=>a.id!==artId);
  save();toast('🗑️ Arte removida');render();
}

            ${art.description?`<p style="margin:0 0 12px 0;font-size:12px;color:var(--muted);line-height:1.4">${art.description}</p>`:''}

              <button class="btn btn-s" style="flex:1;background:#DCFCE7;color:#166534;border:none;font-weight:600" onclick="approveArt('${c.id}','${art.id}')">✅ Aprovar</button>
              <button class="btn btn-s" style="flex:1;background:#FEE2E2;color:#DC2626;border:none;font-weight:600" onclick="rejectArt('${c.id}','${art.id}')">❌ Rejeitar</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    `:`<div style="text-align:center;padding:32px;background:#F9FAFB;border-radius:12px;border:1px dashed var(--border);color:var(--muted)">
      <div style="font-size:32px;margin-bottom:8px">✅</div>
      <p style="margin:0">Nenhuma arte aguardando aprovação no momento!</p>
    </div>`}
    </div>
  </div>`;
  document.getElementById('view').innerHTML=html;
}

function approveArt(cid,artId){
  const c=D.clients.find(c=>c.id===cid);
  if(!c)return;
  const art=c.arts.find(a=>a.id===artId);
  if(!art)return;
  art.status='aprovado';
  save();toast('✅ Arte aprovada!');rClientViewExternal();
}

function rejectArt(cid,artId){
  const c=D.clients.find(c=>c.id===cid);
  if(!c)return;
  const art=c.arts.find(a=>a.id===artId);
  if(!art)return;
  const feedback=prompt('Feedback para o cliente (opcional):');
  if(feedback!==null){
    art.status='rejeitado';
    art.feedback=feedback;
    save();toast('❌ Arte rejeitada');rClientViewExternal();
  }
}

function validateClientEmail(email){
  return D.clients.find(c=>c.email.toLowerCase()===email.toLowerCase())||null;
}

function validateClientPassword(client,password){
  // Convert birthday to DD/MM/YYYY format for password validation
  if(!client.birthday) return false;
  const formatBirthday=(dateStr)=>{
    // If birthday is YYYY-MM-DD format
    if(dateStr.includes('-')){
      const [y,m,d]=dateStr.split('-');
      return `${d}/${m}/${y}`;
    }
    // If already in DD/MM/YYYY format
    return dateStr;
  };
  const birthdayPassword=formatBirthday(client.birthday);
  return password.trim()===birthdayPassword;
}

function loginClientPortal(email,password){
  const client=validateClientEmail(email);
  if(!client){
    toast('❌ Email não encontrado');
    return false;
  }
  if(!validateClientPassword(client,password)){
    toast('❌ Senha incorreta');
    return false;
  }
  S.isClientPortal=true;
  S.authenticatedClientId=client.id;
  S.authenticatedEmail=email;
  sessionStorage.setItem('clientPortalAuth',JSON.stringify({clientId:client.id,email:email}));
  document.getElementById('sidebar').style.display='none';
  document.querySelector('.topbar').style.display='none';
  document.getElementById('main').style.marginLeft='0';
  document.getElementById('main').style.minHeight='100vh';
  render();
  return true;
}

function logoutClientPortal(){
  S.isClientPortal=false;
  S.authenticatedClientId=null;
  S.authenticatedEmail=null;
  sessionStorage.removeItem('clientPortalAuth');
  document.getElementById('sidebar').style.display='flex';
  document.querySelector('.topbar').style.display='flex';
  document.getElementById('main').style.marginLeft='240px';
  window.location.hash='#portal';
}

function openForgotPasswordModal(){

          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
            <div style="text-align:center;padding:12px;background:#F8FAFF;border-radius:10px">
              <div style="font-size:22px;font-weight:700;color:#0D3D9B">${r.prospects||0}</div>
              <div style="font-size:10px;color:#64748B;margin-top:2px">👥 Prospecções</div>
              <div style="margin-top:4px">${trendBadge(r.prospects||0,prv&&prv.prospects)}</div>
            </div>
            <div style="text-align:center;padding:12px;background:#F0FDF4;border-radius:10px">
              <div style="font-size:22px;font-weight:700;color:#16A34A">${r.leads||0}</div>
              <div style="font-size:10px;color:#64748B;margin-top:2px">🎯 Leads</div>
              <div style="margin-top:4px">${trendBadge(r.leads||0,prv&&prv.leads)}</div>
            </div>
            <div style="text-align:center;padding:12px;background:#FFF7ED;border-radius:10px">
              <div style="font-size:22px;font-weight:700;color:#EA580C">${r.meetings||0}</div>
              <div style="font-size:10px;color:#64748B;margin-top:2px">🤝 Reuniões</div>
              <div style="margin-top:4px">${trendBadge(r.meetings||0,prv&&prv.meetings)}</div>
            </div>
            <div style="text-align:center;padding:12px;background:#F0FDF4;border-radius:10px">
              <div style="font-size:22px;font-weight:700;color:#16A34A">${r.sales||0}</div>
              <div style="font-size:10px;color:#64748B;margin-top:2px">✅ Vendas</div>
              <div style="margin-top:4px">${trendBadge(r.sales||0,prv&&prv.sales)}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`}`;
}

function rClientPortalAuth(){
  const c=D.clients.find(c=>c.id===S.authenticatedClientId);
  if(!c){logoutClientPortal();return'';}
  const pv=S.portalView||'dashboard';
  const navItems=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'entregas',icon:'📦',label:'Entregas'},
    {id:'reunioes',icon:'🤝',label:'Reuniões'},
    {id:'relatorios',icon:'📈',label:'Relatórios'},
  ];
  const headerTitles={dashboard:'Dashboard',entregas:'Entregas',reunioes:'Reuniões',relatorios:'Relatórios'};
  const contentMap={dashboard:rPortalDashboard,entregas:rPortalEntregas,reunioes:rPortalReunioes,relatorios:rPortalRelatorios};
  const mainContent=(contentMap[pv]||rPortalDashboard)(c);
  return`<div class="portal-wrapper">
    <div class="portal-sidebar">
      <div class="portal-logo">
        <span class="portal-logo-icon">🔷</span>
        <span class="portal-logo-text">All In</span>
      </div>
      <div class="portal-nav">
        ${navItems.map(n=>`
          <div class="portal-nav-item${pv===n.id?' active':''}" onclick="navPortal('${n.id}')" style="cursor:pointer">
            <span class="portal-nav-icon">${n.icon}</span>
            <span>${n.label}</span>
          </div>`).join('')}
      </div>
      <div class="portal-footer">
        <div class="portal-support">
          <h4>Precisa de ajuda?</h4>
          <p>Fale com nosso time de suporte</p>
          <button class="portal-support-btn" onclick="logoutClientPortal()">🚪 Sair</button>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="portal-header">
        <div class="portal-header-title">${headerTitles[pv]||'Dashboard'}</div>
        <div class="portal-header-right">
          <div class="portal-bell">🔔</div>
          <div class="portal-user">
            <div class="portal-avatar">${c.name.substring(0,2).toUpperCase()}</div>
            <div class="portal-user-info">
              <div class="portal-user-name">${c.name.split(' ')[0]}</div>
              <div class="portal-user-role">Cliente</div>
            </div>
          </div>
        </div>
      </div>
      <div class="portal-main">
        <div class="portal-container">
          ${mainContent}
        </div>
      </div>
    </div>
  </div>`;
}

function handleNavigation(){
  const hash=window.location.hash;
  // Restore admin session if exists
  if(!S.isClientPortal){
    const adminAuth=sessionStorage.getItem('adminAuth');
    const currentUser=sessionStorage.getItem('currentUser');
    if(adminAuth==='true') S.adminAuth=true;
    if(currentUser){try{S.currentUser=JSON.parse(currentUser);}catch(e){}}
  }
  // Check for persisted client session FIRST
  const sessionAuth=sessionStorage.getItem('clientPortalAuth');
  if(sessionAuth){
    try{
      const auth=JSON.parse(sessionAuth);
      if(auth.clientId && auth.email){
        S.isClientPortal=true;
        S.authenticatedClientId=auth.clientId;
        S.authenticatedEmail=auth.email;
        document.getElementById('sidebar').style.display='none';
        document.querySelector('.topbar').style.display='none';
        document.getElementById('main').style.marginLeft='0';
        document.getElementById('main').style.minHeight='100vh';
        render();
        return;
      }
    }catch(e){}
  }
  // Handle portal with token (auto-login)
  if(hash.startsWith('#portal/')){
    const token=hash.replace('#portal/','');
    const client=D.clients.find(c=>c.token===token);
    if(client){
      S.isClientPortal=true;
      S.authenticatedClientId=client.id;
      S.authenticatedEmail=client.email;
      sessionStorage.setItem('clientPortalAuth',JSON.stringify({clientId:client.id,email:client.email}));
      document.getElementById('sidebar').style.display='none';
      document.querySelector('.topbar').style.display='none';
      document.getElementById('main').style.marginLeft='0';
      document.getElementById('main').style.minHeight='100vh';
      render();
      return;
    }
  }
  // Handle portal login page
  if(hash==='#portal'){
    S.isClientPortal=true;
    S.authenticatedClientId=null;
    S.authenticatedEmail=null;
    document.getElementById('sidebar').style.display='none';
    document.querySelector('.topbar').style.display='none';
    document.getElementById('main').style.marginLeft='0';
    document.getElementById('main').style.minHeight='100vh';
    render();
    return;
  }
  // Original external portal mode
  if(detectClientMode()){
    rClientViewExternal();
  }else{
    render();
  }
}
handleNavigation();
window.addEventListener('hashchange',handleNavigation);
</script>
